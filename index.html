 <style>
    body {
      text-align: center;
      background: var(--gris-fond);
      padding: 80px 20px;
    }

    /* ----- HEADER RESPONSIVE ----- */

   header {
     display: flex;
     justify-content: space-between;
     align-items: center;
     padding: 10px 40px;
     max-width: 1200px;
     margin: 0 auto 40px auto;
   }

   header img {
     height: 120px;
     max-width: 100%;
   }

   header h1 {
     flex: 1;
     text-align: center;
     font-size: 2.6em;
     margin-left: 40px;
   }

   /* ------- TABLETTE ------- */
   @media (max-width: 1020px) {
     header img {
       height: 90px;
     }
     header h1 {
       font-size: 2.2em;
     }
   }

   /* ------- PETITE TABLETTE / GRAND TÉLÉPHONE ------- */
   @media (max-width: 760px) {
     header {
       flex-direction: column;
       gap: 10px;
     }
     header img {
       height: 80px;
     }
     header h1 {
       order: -1;
       font-size: 2em;
     }
   }


    main {
      background: #ffffff;
      display: inline-block;
      padding: 50px 80px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      max-width: 1200px;   /* ← AJOUTÉ */
      width: 90%;
    }

    h1 {
      color: var(--bleu-dgac);
      font-size: 4em;
      margin-bottom: 10px;
    }

    p {
      color: #444;
      margin-bottom: 30px;
      font-size: 1.1em;
    }

    .category {
      display: inline-block;
      margin: 20px;
      padding: 20px 40px;
      background: var(--bleu-dgac);
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-size: 1.2em;
      transition: background 0.3s ease, transform 0.2s;
    }

    .category:hover {
      background: var(--bleu-amp);
      transform: translateY(-2px);
    }
 /* Barre de recherche */
     #search-box {
    width: 80%;
    max-width: 500px;
    padding: 12px 18px;
    margin-bottom: 20px;
    border-radius: 8px;
    border: 2px solid var(--bleu-dgac);
    font-size: 1em;
  }

  #search-results {
    margin-top: 10px;
    text-align: left;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }

  #search-results li {
    list-style-type: none;
    background: var(--gris-clair);
    margin: 5px 0;
    padding: 8px 12px;
    border-radius: 6px;
    border-left: 4px solid var(--bleu-amp);
  }
  
  /* ---------- NOUVEAU : layout des catégories (2 lignes) ---------- */
    .category-container {
      display: flex;
      flex-wrap: wrap;            /* permet plusieurs lignes */
      justify-content: center;    /* centre horizontalement */
      gap: 24px;                  /* espacement entre items */
      align-items: flex-end;
      margin-top: 10px;
    }

    .category-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 260px;               /* largeur identique pour les vignettes */
    }

    .category-item img {
      width: 250px;      /* taille par défaut */
      max-width: 100%;   /* jamais plus large que son conteneur */
      height: auto;
      display: block;
      border-radius: 8px;
    }
    
    /* responsive : si écran petit, les vignettes se réorganisent naturellement */
    @media (max-width: 720px) {
      .category-item { width: 45%; }
      .category-item.full-row { flex-basis: 100%; }
    }

    @media (max-width: 420px) {
      .category-item { width: 100%; }
      .category { padding: 14px 18px; font-size: 1em; }
      #search-box { width: 95%; }
      main { padding: 30px; }
    }
    /* --------------------------------------------------------------- */

  </style>

</head>
